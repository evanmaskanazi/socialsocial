    <script>
        // Check auth BEFORE page renders - prevents flash of content
        (async function earlyAuthCheck() {
            try {
                const response = await fetch('/api/auth/session', {credentials: 'include'});
                if (response.status === 401 || !response.ok) {
                    // Not authenticated - redirect to login IMMEDIATELY
                    console.log('[DIARY] Not authenticated, redirecting to login');
                    window.location.replace('/');
                    // Stop page from rendering
                    document.documentElement.innerHTML = '';
                    return;
                }
            } catch (error) {
                console.error('[DIARY] Auth check failed:', error);
                window.location.replace('/');
                document.documentElement.innerHTML = '';
            }
        })();
    </script>

    <script>
    function toggleDiaryMoreMenu() {
        const menu = document.getElementById('diaryMoreMenu');
        if (!menu) return;
        if (menu.classList.contains('hidden')) {
            if (menu.parentNode !== document.body) document.body.appendChild(menu);
            menu.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        } else {
            closeDiaryMoreMenu();
        }
    }
    function closeDiaryMoreMenu() {
        const menu = document.getElementById('diaryMoreMenu');
        if (menu) { menu.classList.add('hidden'); document.body.style.overflow = ''; }
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDiaryMoreMenu(); });

<!-- T30c: Protect localStorage language from i18n.js init corruption -->
<script>
const _originalSetItem = Storage.prototype.setItem;
Storage.prototype.setItem = function(key, value) {
    // Only intercept language-related keys
    if (key === 'selectedLanguage' || key === 'userLanguage') {
        const oldValue = localStorage.getItem(key);

        // Block non-en → en changes UNLESS user explicitly clicked the selector
        if (oldValue && oldValue !== 'en' && value === 'en' && !window._userClickedLanguageSelector) {
            console.warn('[T30c STORAGE GUARD] BLOCKED:', key, oldValue, '→', value, '(no user interaction)');
            return; // Don't corrupt
        }
    }
    return _originalSetItem.apply(this, arguments);
};
</script>

    <!-- CRITICAL FIX: Intercept fetch to block unwanted language POSTs from i18n.js -->
    <script>
    (function() {
        console.log('[FETCH INTERCEPTOR] Installing fetch interceptor for language API...');
        
        const originalFetch = window.fetch;
        window._allowLanguagePost = false;
        window._languagePostBlockedCount = 0;
        
        window.fetch = function(url, options) {
            const urlStr = typeof url === 'string' ? url : url.toString();
            const isLanguagePost = urlStr.includes('/api/user/language') && 
                                   options && options.method && 
                                   options.method.toUpperCase() === 'POST';
            
            if (isLanguagePost) {
                console.log('[FETCH INTERCEPTOR] Detected POST to /api/user/language');
                console.log('[FETCH INTERCEPTOR] _allowLanguagePost:', window._allowLanguagePost);
                
                if (!window._allowLanguagePost) {
                    window._languagePostBlockedCount++;
                    console.warn('[FETCH INTERCEPTOR] BLOCKED unwanted language POST #' + window._languagePostBlockedCount);
                    return Promise.resolve(new Response(JSON.stringify({
                        success: true, message: 'Blocked by interceptor', blocked: true
                    }), { status: 200, headers: { 'Content-Type': 'application/json' } }));
                }
                
                window._allowLanguagePost = false;
                console.log('[FETCH INTERCEPTOR] ALLOWED user-initiated language change');
            }
            return originalFetch.apply(this, arguments);
        };
        
        console.log('[FETCH INTERCEPTOR] Installed');
    })();
    </script>
    
    <!-- FIX 3: ASYNC pre-fetch backend language (replaces synchronous XHR) -->
    <!-- FLOW3 FIX: Added justLoggedIn guard + dual field check to match main page -->
    <script>
    (async function() {
        console.log('[PRE-FETCH DIARY] ========================================');
        console.log('[PRE-FETCH DIARY] Pre-fetching backend language (async)...');
        
        // Initialize user interaction tracking flags
        window._userClickedLanguageSelector = false;
        window._lastLanguageSelectorInteraction = 0;
        window._languageReady = false;
        
        // FLOW3 FIX: Check if user just logged in - if so, DON'T overwrite their language choice
        // This matches the same guard in the main page's pre-fetch
        const justLoggedIn = sessionStorage.getItem('justLoggedIn');
        if (justLoggedIn) {
            console.log('[PRE-FETCH DIARY] User just logged in - preserving localStorage language choice');
            console.log('[PRE-FETCH DIARY] Current localStorage.selectedLanguage:', localStorage.getItem('selectedLanguage'));
            // Clear the flag so subsequent diary visits will sync normally
            sessionStorage.removeItem('justLoggedIn');
            window._languageReady = true;
            window.dispatchEvent(new CustomEvent('languagePreFetchComplete'));
            console.log('[PRE-FETCH DIARY] ========================================');
            return;
        }
        
        try {
            const response = await fetch('/api/user/profile', {
                credentials: 'include',
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            if (response.ok) {
                const profile = await response.json();
                // FLOW3 FIX: Check BOTH preferred_language and language fields (matching main page)
                const backendLang = profile.preferred_language || profile.language;
                const currentLocal = localStorage.getItem('selectedLanguage');
                
                console.log('[PRE-FETCH DIARY] Backend language:', backendLang);
                console.log('[PRE-FETCH DIARY] Current localStorage:', currentLocal);
                
                // FLOW3 FIX: Only update if backend has a value AND localStorage matches or is empty
                // This preserves user's pre-login choice (matching main page logic)
                if (backendLang && (!currentLocal || currentLocal === backendLang)) {
                    localStorage.setItem('selectedLanguage', backendLang);
                    localStorage.setItem('userLanguage', backendLang);
                    console.log('[PRE-FETCH DIARY] SUCCESS: localStorage updated to backend value:', backendLang);
                } else if (currentLocal && currentLocal !== backendLang) {
                    console.log('[PRE-FETCH DIARY] Keeping localStorage value:', currentLocal, '(differs from backend:', backendLang, ')');
                    // Also sync localStorage value TO backend so they match next time
                    // FLOW3: Must set _allowLanguagePost to bypass fetch interceptor
                    try {
                        window._allowLanguagePost = true;
                        await fetch('/api/user/language', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ language: currentLocal, preferred_language: currentLocal })
                        });
                        console.log('[PRE-FETCH DIARY] Synced localStorage language to backend:', currentLocal);
                    } catch (syncErr) {
                        console.warn('[PRE-FETCH DIARY] Failed to sync language to backend:', syncErr);
                    }
                } else {
                    console.log('[PRE-FETCH DIARY] No backend language set, keeping localStorage');
                }
            } else {
                console.log('[PRE-FETCH DIARY] Status:', response.status, '- skipping');
            }
        } catch (e) {
            console.warn('[PRE-FETCH DIARY] Error:', e.message);
        }
        
        window._languageReady = true;
        // Dispatch event so other scripts know language is ready
        window.dispatchEvent(new CustomEvent('languagePreFetchComplete'));
        console.log('[PRE-FETCH DIARY] ========================================');
    })();
    </script>

    <!-- Load scripts -->
    <script src="/static/js/i18n.js?v=R1"></script>
    <script src="/static/js/parameters-social.js?v=T30c"></script>
    <script src="/static/js/feed-updates.js?v=3.0"></script>

    <script>
        console.log('Parameters page loading...');

        // PJ6021: Override goHome function from parameters-social.js to prevent logout
        // The original goHome was calling something that logged the user out
        window.goHome = function() {
            console.log('[DIARY] goHome called - navigating to main app');
            window.location.href = '/';
        };
        
        // Also override any goToHome variant
        window.goToHome = function() {
            console.log('[DIARY] goToHome called - navigating to main app');
            window.location.href = '/';
        };

        // Check if this is for another user - if so, redirect
        function showError(message) {
            const loadingDiv = document.getElementById('loadingMessage');
            const errorDiv = document.getElementById('errorMessage');
            if (loadingDiv) loadingDiv.style.display = 'none';
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = message;
            }
        }

        // Wait for both DOM and language to be ready
        async function initializeWhenReady() {
            // Wait for language pre-fetch if not ready
            if (!window._languageReady) {
                await new Promise(resolve => {
                    window.addEventListener('languagePreFetchComplete', resolve, { once: true });
                    // Timeout fallback
                    setTimeout(resolve, 3000);
                });
            }

            // Check URL params for user viewing
            const urlParams = new URLSearchParams(window.location.search);
            const viewUserId = urlParams.get('user_id');
            if (viewUserId) {
                console.log('[DIARY] Detected user_id param:', viewUserId, '- redirecting to main app');
                window.location.replace('/?tab=following&view=' + viewUserId);
                return;
            }

            // Hide loading message
            const loadingDiv = document.getElementById('loadingMessage');
            if (loadingDiv) {
                loadingDiv.style.display = 'none';
            }

            // Wait a moment for scripts to fully load
            await initParameters();
        }

        async function initParameters() {
            // Check if function exists
            if (typeof initializeParameters !== 'function') {
                showError('Error: initializeParameters function not found. Please refresh the page.');
                console.error('initializeParameters not found');

                // Try again after another delay
                setTimeout(async () => {
                    if (typeof initializeParameters === 'function') {
                        console.log('Function now available, initializing...');
                        await doInitialization();
                    }
                }, 2000);
                return;
            }

            await doInitialization();
        }

        async function doInitialization() {
            try {
                // Fetch and apply user's language preference BEFORE initializing
                try {
                    const savedLang = localStorage.getItem('selectedLanguage');
                    if (savedLang && window.i18n && window.i18n.setLanguage) {
                        console.log('[Parameters] Setting language from localStorage:', savedLang);
                        await window.i18n.setLanguage(savedLang);
                    }

                    const profileResponse = await fetch('/api/user/profile', { credentials: 'include' });
                    if (profileResponse.ok) {
                        const profile = await profileResponse.json();
                        if (profile.preferred_language && window.i18n && window.i18n.setLanguage) {
                            if (profile.preferred_language !== savedLang) {
                                console.log('[Parameters] Syncing language from backend:', profile.preferred_language);
                                await window.i18n.setLanguage(profile.preferred_language);
                            }
                        }
                    }
                } catch (langError) {
                    console.log('[Parameters] Could not fetch language preference, using default');
                }

                initializeParameters();
                console.log('Parameters initialized successfully');

                if (window.i18n && window.i18n.applyLanguage) {
                    window.i18n.applyLanguage();
                }

                if (window.i18n && window.i18n.currentLanguage) {
                    const rtlLanguages = ['ar', 'he'];
                    if (rtlLanguages.includes(window.i18n.currentLanguage)) {
                        document.body.setAttribute('dir', 'rtl');
                    } else {
                        document.body.setAttribute('dir', 'ltr');
                    }
                }

                if (typeof updateCircleDisplays === 'function') {
                    updateCircleDisplays();
                }

                // Verify initialization worked
                setTimeout(() => {
                    const buttons = document.querySelectorAll('.rating-button');
                    console.log(`Initialization check: ${buttons.length} rating buttons created (expected: 20)`);

                    if (buttons.length === 0) {
                        console.warn('No rating buttons found after initialization');
                        const container = document.getElementById('parametersContainer');
                        if (container && container.innerHTML.trim() === '') {
                            console.error('Container is empty - initialization may have failed');
                            showError('Initialization failed. Please refresh the page.');
                        }
                    }
                }, 500);

            } catch (error) {
                console.error('Error initializing:', error);
                showError('Error: ' + error.message);
            }
        }

        // Start initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initializeWhenReady, 100);
            });
        } else {
            setTimeout(initializeWhenReady, 100);
        }

        // Handle language changes with infinite loop prevention
        let isUpdatingLanguage = false;
        let languageUpdateCount = 0;

        window.addEventListener('languageChanged', () => {
            if (isUpdatingLanguage) {
                console.log('Language update already in progress, skipping');
                return;
            }

            languageUpdateCount++;
            if (languageUpdateCount > 10) {
                console.error('Too many language change events, stopping to prevent infinite loop');
                return;
            }

            setTimeout(() => {
                languageUpdateCount = 0;
            }, 1000);

            isUpdatingLanguage = true;
            console.log('Language changed event received');

            try {
                if (typeof updateTranslations === 'function') {
                    updateTranslations();
                }

                if (window.i18n && window.i18n.currentLanguage) {
                    const rtlLanguages = ['ar', 'he'];
                    if (rtlLanguages.includes(window.i18n.currentLanguage)) {
                        document.body.setAttribute('dir', 'rtl');
                    } else {
                        document.body.setAttribute('dir', 'ltr');
                    }
                }

                if (typeof updateCircleDisplays === 'function') {
                    updateCircleDisplays();
                }

            } catch (error) {
                console.error('Error updating language:', error);
            } finally {
                setTimeout(() => {
                    isUpdatingLanguage = false;
                }, 100);
            }
        });
    </script>
</body>
</html>
